<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCRI Emprende Inclusivo - Portal de Clientes</title>
    
    <!-- Tailwind CSS (CDN para uso sin instalación) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Animaciones personalizadas */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes slideInFromBottom { from { opacity: 0; transform: translateY(2rem); } to { opacity: 1; transform: translateY(0); } }
        .slide-in-from-bottom { animation: slideInFromBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 selection:bg-yellow-300 selection:text-slate-900 min-h-screen">

    <!-- CONTENEDOR PRINCIPAL DONDE SE RENDERIZAN LAS VISTAS -->
    <div id="app-root"></div>

    <script>
        // --- MOCK DATA: EMPRENDEDORES DE UCRI ---
        const emprendedores = [
            { id: 1, nombre: "Juan Pérez", negocio: "Masajes Renacer", oficio: "Masoterapia", categoria: "salud", descripcion: "Terapias de relajación profunda y masajes descontracturantes. Encuentra tu paz interior y alivia el estrés del día a día con técnicas especializadas.", telefono: "912345678", rating: 4.9, reviews: 124, ubicacion: "Centro Histórico, Cusco" },
            { id: 2, nombre: "María Quispe", negocio: "Artesanías Luz", oficio: "Textilería", categoria: "artesania", descripcion: "Tejidos hechos a mano con lana de alpaca baby. Ponchos, chalinas y chullos tejidos con amor, dedicación y técnicas ancestrales cusqueñas.", telefono: "987654321", rating: 4.8, reviews: 89, ubicacion: "Mercado San Pedro, Cusco" },
            { id: 3, nombre: "Carlos Huamán", negocio: "Ecos Andinos", oficio: "Música", categoria: "entretenimiento", descripcion: "Música en vivo para eventos, clases particulares de guitarra, charango y quena. Llevando la cultura andina a cada rincón.", telefono: "999888777", rating: 5.0, reviews: 56, ubicacion: "San Blas, Cusco" },
            { id: 4, nombre: "Ana Condori", negocio: "Aromas de Café", oficio: "Venta de Productos", categoria: "productos", descripcion: "Venta de café orgánico tostado y molido artesanalmente, proveniente de la convención. Un aroma que despierta los sentidos.", telefono: "955444333", rating: 4.7, reviews: 210, ubicacion: "Wanchaq, Cusco" },
            { id: 5, nombre: "Luis Mendoza", negocio: "Terapias Holísticas", oficio: "Psicología", categoria: "salud", descripcion: "Acompañamiento emocional y terapias alternativas para el bienestar integral. Espacios de escucha activa y meditación.", telefono: "933222111", rating: 4.9, reviews: 45, ubicacion: "San Jerónimo, Cusco" }
        ];

        const categorias = [
            { id: 'todos', label: 'Todos', icon: 'sparkles' },
            { id: 'salud', label: 'Salud y Bienestar', icon: 'droplets' },
            { id: 'artesania', label: 'Artesanía', icon: 'briefcase' },
            { id: 'entretenimiento', label: 'Música y Arte', icon: 'music' },
            { id: 'productos', label: 'Productos Locales', icon: 'coffee' }
        ];

        // --- ESTADO GLOBAL ---
        let state = {
            activeCategory: 'todos',
            searchQuery: '',
            selectedProfileId: null
        };

        // --- FUNCIONES DE ESTADO Y EVENTOS ---
        function setState(newState) {
            state = { ...state, ...newState };
            renderApp();
        }

        function handleSearch(event) {
            setState({ searchQuery: event.target.value });
        }

        function setCategory(id) {
            setState({ activeCategory: id });
        }

        function selectProfile(id) {
            setState({ selectedProfileId: id });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            setState({ selectedProfileId: null });
        }

        // Generador de colores temáticos (Context-Aware Design)
        const getThemeColors = (categoria) => {
            switch(categoria) {
                case 'salud': return { bg: 'bg-teal-50', text: 'text-teal-900', primary: 'bg-teal-600', hover: 'hover:bg-teal-700', badge: 'bg-teal-100 text-teal-800', border: 'border-teal-200' };
                case 'artesania': return { bg: 'bg-orange-50', text: 'text-orange-950', primary: 'bg-orange-600', hover: 'hover:bg-orange-700', badge: 'bg-orange-100 text-orange-800', border: 'border-orange-200' };
                case 'entretenimiento': return { bg: 'bg-indigo-50', text: 'text-indigo-950', primary: 'bg-indigo-600', hover: 'hover:bg-indigo-700', badge: 'bg-indigo-100 text-indigo-800', border: 'border-indigo-200' };
                case 'productos': return { bg: 'bg-amber-50', text: 'text-amber-950', primary: 'bg-amber-600', hover: 'hover:bg-amber-700', badge: 'bg-amber-100 text-amber-800', border: 'border-amber-200' };
                default: return { bg: 'bg-blue-50', text: 'text-blue-950', primary: 'bg-blue-600', hover: 'hover:bg-blue-700', badge: 'bg-blue-100 text-blue-800', border: 'border-blue-200' };
            }
        };

        // --- FUNCIONES DE RENDERIZADO HTML ---
        
        function renderDirectory() {
            const filteredEmprendedores = emprendedores.filter(emp => {
                const matchesCategory = state.activeCategory === 'todos' || emp.categoria === state.activeCategory;
                const matchesSearch = emp.negocio.toLowerCase().includes(state.searchQuery.toLowerCase()) || 
                                      emp.oficio.toLowerCase().includes(state.searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            return `
            <div class="animate-fadeIn">
                <!-- Navbar -->
                <nav class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
                    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <div class="bg-yellow-400 text-slate-900 p-2 rounded-lg font-bold">
                                <i data-lucide="user" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h1 class="font-extrabold text-xl leading-tight tracking-tight">UCRI</h1>
                                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Emprende Inclusivo</p>
                            </div>
                        </div>
                        <div class="hidden md:flex gap-6 font-medium text-sm text-slate-600">
                            <a href="#" class="text-blue-600 font-bold">Directorio</a>
                            <a href="#" class="hover:text-blue-600 transition-colors">Propósito</a>
                            <a href="#" class="hover:text-blue-600 transition-colors">Cómo Funciona</a>
                        </div>
                        <button class="md:hidden text-slate-600">
                            <i data-lucide="search" class="w-6 h-6"></i>
                        </button>
                    </div>
                </nav>

                <!-- Hero Section -->
                <header class="bg-slate-900 text-white py-16 px-4 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20 pointer-events-none">
                        <div class="absolute -top-24 -right-24 w-96 h-96 bg-yellow-400 rounded-full blur-3xl"></div>
                        <div class="absolute bottom-0 left-10 w-64 h-64 bg-blue-500 rounded-full blur-3xl"></div>
                    </div>
                    <div class="max-w-4xl mx-auto text-center relative z-10">
                        <span class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-semibold text-yellow-400 mb-6 border border-white/20">
                            <i data-lucide="sparkles" class="w-4 h-4"></i> Talento Cusqueño sin Barreras
                        </span>
                        <h2 class="text-4xl md:text-6xl font-extrabold mb-6 leading-tight">
                            Encuentra servicios <br class="hidden md:block"/> excepcionales cerca de ti
                        </h2>
                        <p class="text-lg md:text-xl text-slate-300 mb-10 max-w-2xl mx-auto font-light">
                            Apoya a emprendedores locales con discapacidad visual. Profesionales altamente capacitados listos para brindarte la mejor experiencia.
                        </p>
                        
                        <!-- Buscador -->
                        <div class="max-w-xl mx-auto bg-white rounded-full p-2 flex shadow-2xl focus-within:ring-4 ring-yellow-400 transition-all">
                            <div class="pl-4 flex items-center text-slate-400">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </div>
                            <input 
                                type="text" 
                                placeholder="Busca masajes, artesanías, música..." 
                                class="w-full bg-transparent border-none outline-none px-4 text-slate-800 placeholder-slate-400"
                                value="${state.searchQuery}"
                                oninput="handleSearch(event)"
                            />
                            <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-bold transition-colors">
                                Buscar
                            </button>
                        </div>
                    </div>
                </header>

                <main class="max-w-6xl mx-auto px-4 py-12">
                    <!-- Filtros de Categoría -->
                    <div class="flex overflow-x-auto pb-4 mb-8 gap-3 hide-scrollbar">
                        ${categorias.map(cat => `
                            <button 
                                onclick="setCategory('${cat.id}')"
                                class="whitespace-nowrap flex items-center gap-2 px-5 py-2.5 rounded-full font-semibold transition-all ${
                                    state.activeCategory === cat.id 
                                        ? 'bg-slate-900 text-white shadow-md' 
                                        : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300 hover:bg-slate-50'
                                }"
                            >
                                <i data-lucide="${cat.icon}" class="w-[18px] h-[18px]"></i> ${cat.label}
                            </button>
                        `).join('')}
                    </div>

                    <!-- Grid de Resultados -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${filteredEmprendedores.map(emp => {
                            const theme = getThemeColors(emp.categoria);
                            return `
                            <div onclick="selectProfile(${emp.id})" class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 group flex flex-col h-full cursor-pointer">
                                <!-- Header de la tarjeta -->
                                <div class="h-24 ${theme.bg} relative p-4 flex items-start justify-between">
                                    <span class="text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider ${theme.badge}">
                                        ${emp.oficio}
                                    </span>
                                    <button class="bg-white/50 hover:bg-white p-2 rounded-full backdrop-blur-sm transition-colors text-slate-400 hover:text-red-500" onclick="event.stopPropagation()">
                                        <i data-lucide="heart" class="w-5 h-5"></i>
                                    </button>
                                </div>
                                <!-- Cuerpo de la tarjeta -->
                                <div class="px-6 pb-6 pt-0 relative flex-1 flex flex-col">
                                    <div class="w-16 h-16 rounded-2xl bg-white shadow-lg flex items-center justify-center text-2xl font-bold border-4 border-white -mt-8 mb-4 relative z-10 text-slate-700">
                                        ${emp.nombre.charAt(0)}
                                    </div>
                                    <h3 class="text-xl font-bold text-slate-900 mb-1">${emp.negocio}</h3>
                                    <p class="text-sm text-slate-500 mb-3 font-medium">Por ${emp.nombre}</p>
                                    
                                    <div class="flex items-center gap-4 mb-4 text-sm font-medium">
                                        <div class="flex items-center text-yellow-500 gap-1">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                            <span class="text-slate-700">${emp.rating} <span class="text-slate-400 font-normal">(${emp.reviews})</span></span>
                                        </div>
                                        <div class="flex items-center text-slate-500 gap-1 truncate">
                                            <i data-lucide="map-pin" class="w-4 h-4 flex-shrink-0"></i>
                                            <span class="truncate max-w-[120px]">${emp.ubicacion}</span>
                                        </div>
                                    </div>
                                    <p class="text-slate-600 text-sm line-clamp-3 mb-6 flex-1">
                                        ${emp.descripcion}
                                    </p>
                                    <button class="w-full py-3 rounded-xl font-bold transition-colors ${theme.primary} text-white ${theme.hover}">
                                        Ver Perfil
                                    </button>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>

                    ${filteredEmprendedores.length === 0 ? `
                        <div class="text-center py-20">
                            <div class="inline-flex bg-slate-100 p-6 rounded-full mb-4 text-slate-400">
                                <i data-lucide="search" class="w-12 h-12"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-700 mb-2">No se encontraron resultados</h3>
                            <p class="text-slate-500">Intenta buscar con otros términos o cambia la categoría.</p>
                        </div>
                    ` : ''}
                </main>
            </div>
            `;
        }

        function renderProfile() {
            const profile = emprendedores.find(e => e.id === state.selectedProfileId);
            if (!profile) return '';

            const theme = getThemeColors(profile.categoria);
            const waText = encodeURIComponent(`Hola ${profile.nombre}, vi tu perfil en el Portal UCRI y me gustaría saber más sobre tu servicio.`);

            return `
            <div class="${theme.bg} min-h-screen slide-in-from-bottom pb-24">
                <!-- Botón de regreso -->
                <div class="sticky top-0 z-50 p-4">
                    <button 
                        onclick="goBack()"
                        class="bg-white/80 backdrop-blur-md hover:bg-white text-slate-800 px-4 py-2 rounded-full font-bold shadow-sm border border-white flex items-center gap-2 transition-all hover:-translate-x-1"
                    >
                        <i data-lucide="arrow-left" class="w-5 h-5"></i> Volver al Directorio
                    </button>
                </div>

                <div class="max-w-3xl mx-auto px-4 -mt-16">
                    <!-- Tarjeta Principal del Perfil -->
                    <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden mt-20 border border-slate-100 relative z-10">
                        <!-- Header Temático -->
                        <div class="${theme.primary} h-32 md:h-48 relative">
                            <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                        </div>

                        <div class="px-6 md:px-12 pb-12 relative -mt-16">
                            <!-- Header Info -->
                            <div class="flex flex-col md:flex-row md:items-end gap-6 mb-8">
                                <div class="w-32 h-32 rounded-3xl bg-white shadow-xl flex items-center justify-center text-5xl font-bold border-8 border-white text-slate-700">
                                    ${profile.nombre.charAt(0)}
                                </div>
                                <div class="flex-1 pb-2">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider ${theme.badge}">
                                            ${profile.oficio}
                                        </span>
                                        <span class="flex items-center gap-1 text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-600">
                                            <i data-lucide="shield-check" class="w-3.5 h-3.5 text-green-500"></i> Verificado
                                        </span>
                                    </div>
                                    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-1 leading-tight">
                                        ${profile.negocio}
                                    </h1>
                                    <p class="text-lg text-slate-500 font-medium">Dirigido por ${profile.nombre}</p>
                                </div>
                            </div>

                            <!-- Stats Row -->
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 p-6 rounded-3xl bg-slate-50 border border-slate-100">
                                <div class="text-center md:text-left">
                                    <p class="text-sm text-slate-500 mb-1 flex items-center justify-center md:justify-start gap-1"><i data-lucide="star" class="w-4 h-4 text-yellow-500"></i> Calificación</p>
                                    <p class="font-bold text-xl text-slate-900">${profile.rating} <span class="text-sm font-normal text-slate-500">/ 5.0</span></p>
                                </div>
                                <div class="text-center md:text-left border-l border-slate-200 md:pl-4">
                                    <p class="text-sm text-slate-500 mb-1 flex items-center justify-center md:justify-start gap-1"><i data-lucide="message-circle" class="w-4 h-4"></i> Reseñas</p>
                                    <p class="font-bold text-xl text-slate-900">${profile.reviews} <span class="text-sm font-normal text-slate-500">opiniones</span></p>
                                </div>
                                <div class="text-center md:text-left md:border-l border-slate-200 md:pl-4 col-span-2">
                                    <p class="text-sm text-slate-500 mb-1 flex items-center justify-center md:justify-start gap-1"><i data-lucide="map-pin" class="w-4 h-4"></i> Ubicación</p>
                                    <p class="font-bold text-lg text-slate-900 truncate">${profile.ubicacion}</p>
                                </div>
                            </div>

                            <!-- Acerca del Servicio -->
                            <div class="mb-10">
                                <h3 class="text-xl font-bold text-slate-900 mb-4">Acerca del Servicio</h3>
                                <p class="text-lg text-slate-600 leading-relaxed">
                                    "${profile.descripcion}"
                                </p>
                            </div>

                            <!-- Sello de Accesibilidad -->
                            <div class="p-4 rounded-2xl flex items-start gap-4 ${theme.bg} ${theme.border} border">
                                <div class="p-2 rounded-full bg-white shadow-sm ${theme.text}">
                                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold ${theme.text}">Emprendimiento Inclusivo UCRI</h4>
                                    <p class="text-sm text-slate-600 mt-1">
                                        Al contratar este servicio estás apoyando el trabajo autónomo de personas con discapacidad visual en Cusco. ¡Gracias por sumar a la inclusión!
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Floating Action Bar (Conversión a WhatsApp) -->
                <div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 pb-6 md:pb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50">
                    <div class="max-w-3xl mx-auto flex gap-4 items-center">
                        <button class="p-4 rounded-2xl bg-slate-100 text-slate-600 hover:bg-slate-200 transition-colors hidden md:block">
                            <i data-lucide="heart" class="w-6 h-6"></i>
                        </button>
                        <a 
                            href="tel:${profile.telefono}"
                            class="flex-1 py-4 px-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 border-2 border-slate-200 text-slate-700 hover:bg-slate-50 transition-all text-center"
                        >
                            <i data-lucide="phone" class="w-6 h-6"></i> <span class="hidden md:inline">Llamar</span>
                        </a>
                        <a 
                            href="https://wa.me/51${profile.telefono}?text=${waText}"
                            target="_blank"
                            rel="noopener noreferrer"
                            class="flex-[2] py-4 px-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white shadow-lg shadow-green-500/30 transition-transform hover:scale-[1.02] active:scale-95 text-center"
                        >
                            <i data-lucide="message-circle" class="w-6 h-6"></i> Contactar por WhatsApp
                        </a>
                    </div>
                </div>
            </div>
            `;
        }

        // --- SISTEMA DE ACTUALIZACIÓN DEL DOM ---
        function renderApp() {
            const root = document.getElementById('app-root');
            
            if (state.selectedProfileId !== null) {
                root.innerHTML = renderProfile();
            } else {
                root.innerHTML = renderDirectory();
            }

            // Inicializar o refrescar los íconos Lucide después de insertar el HTML
            lucide.createIcons();
        }

        // Iniciar la aplicación cuando cargue la página
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });

    </script>
</body>
</html>
